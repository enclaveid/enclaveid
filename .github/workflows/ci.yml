name: CI
on:
  push:
    branches:
      # Change this if your primary branch is not main
      - master

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Free Disk Space (Ubuntu)
        # uses: jlumbroso/free-disk-space@v1.3.1
        uses: xc2/free-disk-space@v1.0.0
        with:
          # This might remove tools that are actually needed, if set to "true" but frees about 6 GB
          tool-cache: false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install poetry
        uses: abatilo/actions-poetry@v2

      - uses: actions/cache@v3
        name: Define a cache for the data-pipeline virtual environment based on the dependencies lock file
        with:
          path: ./apps/data-pipeline/.venv
          key: venv-${{ hashFiles('./apps/data-pipeline/poetry.lock') }}

      - uses: pnpm/action-setup@v2
        with:
          version: 9.4.0
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'

      # TODO: figure out how to cache container builds to enable the distributed CI
      # - name: Start distributed CI run
      #   run: pnpx nx-cloud start-ci-run --distribute-on="3 linux-medium-js"

      - run: CI=true pnpm install

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      #- run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} pnpm exec nx run data-pipeline:container
      - run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} pnpm exec nx run data-pipeline:container-vllm
      #- run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} pnpm exec nx run data-pipeline:container-rapids

      # - name: Stop distributed CI run
      #   run: pnpx nx-cloud complete-ci-run
