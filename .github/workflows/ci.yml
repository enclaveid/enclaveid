name: CI
on:
  push:
    branches:
      # Change this if your primary branch is not main
      - master

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Free Disk Space (Ubuntu)
        # uses: jlumbroso/free-disk-space@v1.3.1
        uses: xc2/free-disk-space@v1.0.0
        with:
          # This might remove tools that are actually needed, if set to "true" but frees about 6 GB
          tool-cache: true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.14'
      - name: Install poetry
        uses: abatilo/actions-poetry@v2

      - uses: actions/cache@v3
        name: Define a cache for the data-pipeline virtual environment based on the dependencies lock file
        with:
          path: ./apps/data-pipeline/.venv
          key: venv-${{ hashFiles('./apps/data-pipeline/poetry.lock') }}

      - uses: pnpm/action-setup@v2
        with:
          version: 9.4.0
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'
      # This line enables distribution
      # The "--stop-agents-after" is optional, but allows idle agents to shut down once the "e2e-ci" targets have been requested
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="container"
      - run: CI=true pnpm install

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: master

      #- run: pnpm exec nx-cloud record -- nx format:check
      - run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} pnpm exec nx affected -t container container-base container-ml --parallel=3
