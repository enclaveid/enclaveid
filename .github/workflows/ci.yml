name: CI
on:
  push:
    branches:
      - master

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: xc2/free-disk-space@v1.0.0 # TODO: wait for merge into jlumbroso/free-disk-space
        with:
          # This might remove tools that are actually needed, if set to "true" but frees about 6 GB
          tool-cache: true
          # This one is too slow for the amount of space it frees
          large-packages: false
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.PAT_GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install poetry
        uses: abatilo/actions-poetry@v2

      # - uses: actions/cache@v3
      #   name: Define a cache for the data-pipeline virtual environment based on the dependencies lock file
      #   with:
      #     path: ./apps/data-pipeline/.venv
      #     key: venv-${{ hashFiles('./apps/data-pipeline/poetry.lock') }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

        #TODO
      - name: Build projects
        run: |
          bun nx run backend:build
          bun nx run api:copy-prisma-client
          bun nx run api:build

      # TODO: In order to make the nx distributed CI work, we need to configure a custom runner
      # since it doesn't retain the state of the current GHA runner
      # - name: Start distributed CI run
      #   run: pnpx nx-cloud start-ci-run --distribute-on="3 linux-medium-js"

      # - uses: nrwl/nx-set-shas@v4
      #   with:
      #     main-branch-name: master

      # # TODO: use werf
      # - run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} bun nx run data-pipeline:container
      # - run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} bun nx run data-pipeline:container-vllm
      # - run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} bun nx run data-pipeline:container-rapids
      #- run: INPUT_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} bun nx run data-pipeline:container-jupyter

      # - name: Stop distributed CI run
      #   run: pnpx nx-cloud complete-ci-run

      - name: Install werf
        uses: werf/actions/install@v2

      - name: Run werf converge
        run: |
          source "$(werf ci-env github --as-file)"
          werf converge --secret-values=k8s/basic/secret-values/secret-values.yaml
        env:
          WERF_ENV: production
          WERF_KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
