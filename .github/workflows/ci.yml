name: CI
on:
  push:
    branches:
      - master

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: Jayllyz/free-disk-space@18c3e586e6c1b4d4e68c29fee0748064bd8ee52c
        with:
          # This might remove tools that are actually needed, if set to "true" but frees about 6 GB
          tool-cache: true
          # This one is too slow for the amount of space it frees
          large-packages: true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Authenticate Buildah
        env:
          REGISTRY_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo $REGISTRY_PASSWORD | buildah login -u $REGISTRY_USERNAME --password-stdin docker.io

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install poetry
        uses: abatilo/actions-poetry@v3

      - uses: actions/cache@v4
        name: Cache for werf manifests
        with:
          key: werf-manifests
          path: ~/.werf/local_cache
          save-always: true

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

        #TODO use nx affected to only build the projects that have changed
      - name: Build projects
        run: |
          bun nx run backend:build
          bun nx run api:copy-prisma-client
          bun nx run api:build
          bun nx run spa-frontend:build
          bun nx run data-pipeline:build

      - name: Install werf
        uses: werf/actions/install@v2

      - name: Configure Git for werf
        run: |
          git config --global url."https://x-access-token:${{ secrets.PAT_GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run werf converge
        run: |
          source "$(werf ci-env github --as-file)"
          werf converge \
          werf helm get-autogenerated-values

        env:
          WERF_ENV: production
          WERF_KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
          WERF_SECRET_KEY: ${{ secrets.WERF_SECRET_KEY }}
          WERF_BUILDAH_MODE: auto
          WERF_REPO_DOCKER_HUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          WERF_REPO_DOCKER_HUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          WERF_LOG_VERBOSE: true
          WERF_ALLOWED_LOCAL_CACHE_VOLUME_USAGE: 100
          WERF_REPO: docker.io/enclaveid/cluster
          WERF_SECRET_VALUES_ENV: k8s/basic/secret-values/secret-values.yaml

      - name: Sync Dagster
        run: |
          pip install dagster-cloud
          dagster-cloud deployment sync-locations -w apps/data-pipeline/dagster_cloud.yaml
