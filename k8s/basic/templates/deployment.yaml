apiVersion: apps/v1
kind: Deployment
metadata:
  name: { { include "enclaveid.fullname" . } }
  labels: { { - include "enclaveid.labels" . | nindent 4 } }
spec:
  replicas: { { .Values.replicaCount } }
  selector:
    matchLabels: { { - include "enclaveid.selectorLabels" . | nindent 6 } }
  template:
    metadata:
      labels: { { - include "enclaveid.selectorLabels" . | nindent 8 } }
    spec:
      containers:
        - name: { { .Chart.Name } }
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          imagePullPolicy: { { .Values.image.pullPolicy } }
          ports:
            - name: http
              containerPort: { { .Values.service.port } }
              protocol: TCP
