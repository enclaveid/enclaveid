[tool.coverage.run]
branch = true
source = ["data_pipeline"]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = "--cov --cov-report html:'../../coverage/apps/data-pipeline/html' --cov-report xml:'../../coverage/apps/data-pipeline/coverage.xml' --html='../../reports/apps/data-pipeline/unittests/html/index.html' --junitxml='../../reports/apps/data-pipeline/unittests/junit.xml'"

[tool.poetry]
name = "data-pipeline"
version = "1.0.0"
description = "Automatically generated by Nx."
authors = []
license = 'Proprietary'
readme = 'README.md'

[[tool.poetry.packages]]
include = "data_pipeline"

[[tool.poetry.source]]
name = "nvidia"
url = "https://pypi.nvidia.com"
priority = "supplemental"

[tool.poetry.dependencies]
python = ">=3.10,<3.12"
dagster = "^1.8.4"
openai = "^1.43.1"
aiolimiter = "^1.1.0"
adlfs = "^2024.4.1"
dagster-cloud = "^1.8.4"
dagster-polars = "^0.24.4"
numpy = "^1.26.4"
polars = "^0.20.23"
pgvector = "^0.2.5"
universal-pathlib = "^0.2.2"
psycopg = "^3.1.19"
psycopg-binary = "^3.1.19"
tqdm = "^4.66.2"
mistralai = "^1.0.3"
dagster-k8s = "^0.24.4"
curlify2 = "^2.0.0"
pandas = "2.2.1"
sqlalchemy = "^2.0.31"
cuid2 = "^2.0.1"
huggingface-hub = "^0.24.5"
outlines = "^0.0.46"
json-repair = "^0.28.0"
jsonpickle = "^3.2.2"
ray = "2.34.0"
pillow = "10.4.0"
# The following are very large packages, they are cached as docker layers and shouldn't be changed often.
# We split ML deps in two grups to avoid conflicts.
[tool.poetry.group.vllm.dependencies]
torch = "2.4.0"
vllm = "0.6.1.post2"
transformers = "4.43.3"
sentence-transformers = "3.0.1"
# Diffusers deps
diffusers = "0.30.2"
accelerate = "0.34.1"
sentencepiece = "0.2.0"
#protobuf = "5.28.1"

[tool.poetry.group.rapids.dependencies]
hdbscan = "^0.8.37"
# dask-cudf-cu12 = { version = "24.4.0", source = "nvidia" }
# cuml-cu12 = { version = "24.4.0", source = "nvidia" }
# cudf-cu12 = { version = "24.4.0", source = "nvidia" }
# cugraph-cu12 = { version = "24.4.0", source = "nvidia" }

[tool.poetry.group.dev.dependencies]
autopep8 = "2.0.2"
ruff = "0.1.5"
pytest = "7.3.1"
pytest-sugar = "0.9.7"
pytest-cov = "4.1.0"
pytest-html = "3.2.0"
dagster-webserver = "^1.8.4"
ptpython = "^3.0.29"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.dagster]
module_name = "data_pipeline"

[tool.ruff]
exclude = [".ruff_cache", ".svn", ".tox", ".venv", "dist"]

line-length = 88
indent-width = 4

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # Pyflakes
  "F",
  # pyupgrade
  "UP",
  # flake8-bugbear
  "B",
  # flake8-simplify
  "SIM",
  # isort
  "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []
